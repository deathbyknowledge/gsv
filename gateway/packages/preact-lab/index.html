<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Preact Lab</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f4ed;
        --ink: #1f2937;
        --muted: #6b7280;
        --edge: #d6cfbf;
        --panel: #fffdf8;
        --accent: #0f766e;
        --accent-soft: #dff5f2;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        margin: 0;
        min-height: 100%;
      }

      body {
        background:
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.08), transparent 28%),
          linear-gradient(180deg, #faf7f1 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: "Avenir Next", "Trebuchet MS", sans-serif;
      }

      button,
      input {
        font: inherit;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
