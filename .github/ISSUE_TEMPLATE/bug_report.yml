name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [Gateway, CLI, Web UI, Device node, Adapter, Built-in package, Other]
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: shell

  - type: input
    id: version
    attributes:
      label: GSV version (`gsv --version`)
