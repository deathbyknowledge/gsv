name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Resolve which channel we're building for
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.channel.outputs.version }}
      kind: ${{ steps.channel.outputs.kind }}
      short_sha: ${{ steps.channel.outputs.short_sha }}
      release_tag: ${{ steps.channel.outputs.release_tag }}
      release_name: ${{ steps.channel.outputs.release_name }}
      built_at: ${{ steps.channel.outputs.built_at }}
      prerelease: ${{ steps.channel.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify synced versions
        run: npm run version:check

      - name: Resolve release
        id: channel
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION="$(npm run --silent version:show)"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            KIND="stable"
          else
            KIND="dev"
          fi

          if [ "$KIND" = "stable" ]; then
            EXPECTED_TAG="$(node ./scripts/release.mjs stable-tag)"
            if [[ "${{ github.ref }}" == refs/tags/* ]]; then
              RELEASE_TAG="${GITHUB_REF_NAME}"
            else
              RELEASE_TAG="$EXPECTED_TAG"
            fi
            if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
              echo "Stable release tag must match ${EXPECTED_TAG}, got ${RELEASE_TAG}" >&2
              exit 1
            fi
            RELEASE_NAME="GSV ${RELEASE_TAG}"
            PRERELEASE="false"
          else
            RELEASE_TAG="$(node ./scripts/release.mjs dev-tag)"
            RELEASE_NAME="GSV (dev)"
            PRERELEASE="true"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "kind=${KIND}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "built_at=${BUILT_AT}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

  # Build CLI binaries for multiple platforms
  build-cli:
    needs: [resolve]
    env:
      GSV_BUILD_CHANNEL: ${{ needs.resolve.outputs.kind }}
      GSV_BUILD_SHA: ${{ github.sha }}
      GSV_BUILD_RUN_NUMBER: ${{ github.run_number }}
      GSV_BUILD_TAG: ${{ needs.resolve.outputs.release_tag }}
      GSV_BUILD_TIMESTAMP: ${{ needs.resolve.outputs.built_at }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gsv-linux-x64
            binary: gsv
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: gsv-linux-arm64
            binary: gsv
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: gsv-darwin-x64
            binary: gsv
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gsv-darwin-arm64
            binary: gsv
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gsv-windows-x64.exe
            binary: gsv.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI (Linux - use rustls to avoid OpenSSL)
        if: runner.os == 'Linux'
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features rustls
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          GSV_BUILD_CHANNEL: ${{ needs.resolve.outputs.kind }}
          GSV_BUILD_SHA: ${{ github.sha }}
          GSV_BUILD_RUN_NUMBER: ${{ github.run_number }}
          GSV_BUILD_TAG: ${{ needs.resolve.outputs.release_tag }}
          GSV_BUILD_TIMESTAMP: ${{ needs.resolve.outputs.built_at }}

      - name: Build CLI (macOS - use native-tls for system certs)
        if: runner.os == 'macOS'
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}
        env:
          GSV_BUILD_CHANNEL: ${{ needs.resolve.outputs.kind }}
          GSV_BUILD_SHA: ${{ github.sha }}
          GSV_BUILD_RUN_NUMBER: ${{ github.run_number }}
          GSV_BUILD_TAG: ${{ needs.resolve.outputs.release_tag }}
          GSV_BUILD_TIMESTAMP: ${{ needs.resolve.outputs.built_at }}

      - name: Build CLI (Windows - use native-tls for system certs)
        if: runner.os == 'Windows'
        working-directory: cli
        run: cargo build --release --target ${{ matrix.target }}
        env:
          GSV_BUILD_CHANNEL: ${{ needs.resolve.outputs.kind }}
          GSV_BUILD_SHA: ${{ github.sha }}
          GSV_BUILD_RUN_NUMBER: ${{ github.run_number }}
          GSV_BUILD_TAG: ${{ needs.resolve.outputs.release_tag }}
          GSV_BUILD_TIMESTAMP: ${{ needs.resolve.outputs.built_at }}

      - name: Rename binary
        shell: bash
        run: |
          mv "cli/target/${{ matrix.target }}/release/${{ matrix.binary }}" "cli/target/${{ matrix.target }}/release/${{ matrix.artifact }}"

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  # Build pre-bundled Cloudflare deployment artifacts.
  build-cloudflare-bundles:
    needs: [resolve]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            gateway/package-lock.json
            web/package-lock.json
            ripgit/package-lock.json
            adapters/whatsapp/package-lock.json
            adapters/discord/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build Cloudflare bundles
        run: |
          set -euo pipefail
          npm run release:build:cloudflare -- "$GITHUB_WORKSPACE/release"

      - name: Upload Cloudflare bundles
        uses: actions/upload-artifact@v4
        with:
          name: gsv-cloudflare-bundles
          path: |
            release/gsv-cloudflare-assembler.tar.gz
            release/gsv-cloudflare-gateway.tar.gz
            release/gsv-cloudflare-ripgit.tar.gz
            release/gsv-cloudflare-channel-whatsapp.tar.gz
            release/gsv-cloudflare-channel-discord.tar.gz
            release/cloudflare-checksums.txt

  # Create GitHub Release with all artifacts
  release:
    needs: [resolve, build-cli, build-cloudflare-bundles]
    runs-on: ubuntu-latest
    env:
      KIND: ${{ needs.resolve.outputs.kind }}
      RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
      RELEASE_NAME: ${{ needs.resolve.outputs.release_name }}
      SHORT_SHA: ${{ needs.resolve.outputs.short_sha }}
      BUILT_AT: ${{ needs.resolve.outputs.built_at }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release

          # CLI binaries
          cp artifacts/gsv-linux-x64/gsv-linux-x64 release/
          cp artifacts/gsv-linux-arm64/gsv-linux-arm64 release/
          cp artifacts/gsv-darwin-x64/gsv-darwin-x64 release/
          cp artifacts/gsv-darwin-arm64/gsv-darwin-arm64 release/
          cp artifacts/gsv-windows-x64.exe/gsv-windows-x64.exe release/

          # Cloudflare deploy bundles (modular, per component/channel)
          cp artifacts/gsv-cloudflare-bundles/gsv-cloudflare-assembler.tar.gz release/
          cp artifacts/gsv-cloudflare-bundles/gsv-cloudflare-gateway.tar.gz release/
          cp artifacts/gsv-cloudflare-bundles/gsv-cloudflare-ripgit.tar.gz release/
          cp artifacts/gsv-cloudflare-bundles/gsv-cloudflare-channel-whatsapp.tar.gz release/
          cp artifacts/gsv-cloudflare-bundles/gsv-cloudflare-channel-discord.tar.gz release/
          cp artifacts/gsv-cloudflare-bundles/cloudflare-checksums.txt release/

          # Make binaries executable
          chmod +x release/gsv-*

          # Include install script
          cp install.sh release/
          cp install.ps1 release/

          # Create checksums
          cd release && sha256sum * > checksums.txt

      - name: Build release body
        id: body
        run: |
          if [ "$KIND" = "stable" ]; then
            TITLE="${RELEASE_NAME}"
            INSTALL_CMD='curl -sSL https://install.gsv.space | bash'
            INSTALL_CMD_PS='irm https://install.gsv.space/install.ps1 | iex'
            DEV_CHANNEL_NOTE=""
          else
            TITLE="${RELEASE_NAME}"
            INSTALL_CMD='curl -sSL https://install.gsv.space | GSV_CHANNEL=dev bash'
            INSTALL_CMD_PS='$env:GSV_CHANNEL="dev"; irm https://install.gsv.space/install.ps1 | iex'
            DEV_CHANNEL_NOTE=$(cat <<'DEV_NOTE'
          ### Dev Channel

          `dev` is a moving prerelease channel that always tracks the latest commit on `main`.
          For an immutable release, install a versioned `v*.*.*` tag instead.
          DEV_NOTE
            )
          fi
          INSTALL_TAG_CMD_PS="\$env:GSV_VERSION='${RELEASE_TAG}'; irm https://install.gsv.space/install.ps1 | iex"

          cat > body.md <<BODY
          ## ${TITLE}

          **Commit:** \`${SHORT_SHA}\` · **Built:** ${BUILT_AT} · **Release tag:** \`${RELEASE_TAG}\`

          ### Installation

          \`\`\`bash
          ${INSTALL_CMD}
          \`\`\`

          \`\`\`powershell
          ${INSTALL_CMD_PS}
          \`\`\`

          Pin a specific release tag:

          \`\`\`bash
          curl -sSL https://install.gsv.space | GSV_VERSION=${RELEASE_TAG} bash
          \`\`\`

          \`\`\`powershell
          ${INSTALL_TAG_CMD_PS}
          \`\`\`

          ${DEV_CHANNEL_NOTE}

          ### Cloudflare Bundles

          Cloudflare artifacts are split by component:
          - \`gsv-cloudflare-assembler.tar.gz\`
          - \`gsv-cloudflare-gateway.tar.gz\`
          - \`gsv-cloudflare-ripgit.tar.gz\`
          - \`gsv-cloudflare-channel-whatsapp.tar.gz\`
          - \`gsv-cloudflare-channel-discord.tar.gz\`

          ### Manual Installation

          Download the binary for your platform:
          - **macOS (Apple Silicon)**: \`gsv-darwin-arm64\`
          - **macOS (Intel)**: \`gsv-darwin-x64\`
          - **Linux (x64)**: \`gsv-linux-x64\`
          - **Linux (ARM64)**: \`gsv-linux-arm64\`
          - **Windows (x64)**: \`gsv-windows-x64.exe\`
          BODY

      - name: Move mutable dev tag
        if: needs.resolve.outputs.kind == 'dev'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          MAIN_SHA="$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')"
          if [ "${MAIN_SHA}" != "${GITHUB_SHA}" ]; then
            echo "Refusing to publish stale dev release: main is ${MAIN_SHA}, this run is ${GITHUB_SHA}" >&2
            exit 1
          fi

          if gh api "repos/${REPO}/git/ref/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            gh api "repos/${REPO}/git/refs/tags/${RELEASE_TAG}" \
              -X PATCH \
              -f sha="${GITHUB_SHA}" \
              -F force=true >/dev/null
          else
            gh api "repos/${REPO}/git/refs" \
              -X POST \
              -f ref="refs/tags/${RELEASE_TAG}" \
              -f sha="${GITHUB_SHA}" >/dev/null
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_NAME }}
          draft: false
          prerelease: ${{ needs.resolve.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.resolve.outputs.kind == 'stable' }}
          overwrite_files: true
          append_body: false
          body_path: body.md
          files: |
            release/gsv-linux-x64
            release/gsv-linux-arm64
            release/gsv-darwin-x64
            release/gsv-darwin-arm64
            release/gsv-windows-x64.exe
            release/gsv-cloudflare-assembler.tar.gz
            release/gsv-cloudflare-gateway.tar.gz
            release/gsv-cloudflare-ripgit.tar.gz
            release/gsv-cloudflare-channel-whatsapp.tar.gz
            release/gsv-cloudflare-channel-discord.tar.gz
            release/cloudflare-checksums.txt
            release/install.sh
            release/install.ps1
            release/checksums.txt
