name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      version: ${{ steps.filter.outputs.version }}
      sdk: ${{ steps.filter.outputs.sdk }}
      web: ${{ steps.filter.outputs.web }}
      extension: ${{ steps.filter.outputs.extension }}
      assembler: ${{ steps.filter.outputs.assembler }}
      gateway: ${{ steps.filter.outputs.gateway }}
      ripgit: ${{ steps.filter.outputs.ripgit }}
      cli: ${{ steps.filter.outputs.cli }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect affected components
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            version:
              - '.github/workflows/ci.yml'
              - 'VERSION'
              - 'scripts/version.mjs'
              - 'package.json'
              - 'package-lock.json'
              - 'packages/gsv/package.json'
              - 'assembler/package.json'
              - 'assembler/Cargo.toml'
              - 'assembler/Cargo.lock'
              - 'cli/Cargo.toml'
              - 'cli/Cargo.lock'
              - 'extension/package.json'
              - 'extension/public/manifest.json'
              - 'extension/src/background/service-worker.ts'
              - 'extension/src/target/network-recorder.ts'
              - 'gateway/package.json'
              - 'gateway/package-lock.json'
              - 'gateway/src/kernel/do.ts'
              - 'gateway/src/kernel/config.ts'
              - 'gateway/src/drivers/native/shell.test.ts'
              - 'web/package.json'
              - 'web/package-lock.json'
              - 'web/src/app/services/gateway/GatewayProvider.tsx'
              - 'web/src/app/services/session/sessionService.ts'
              - 'ripgit/package.json'
              - 'ripgit/package-lock.json'
              - 'ripgit/Cargo.toml'
              - 'ripgit/Cargo.lock'
              - 'ripgit/src/lib.rs'
              - 'adapters/*/package.json'
              - 'adapters/*/package-lock.json'
            sdk:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'packages/gsv/**'
            web:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'packages/gsv/**'
              - 'web/**'
            extension:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'packages/gsv/**'
              - 'extension/**'
            assembler:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/worker-build.sh'
              - 'assembler/**'
            gateway:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'packages/gsv/**'
              - 'gateway/**'
            ripgit:
              - '.github/workflows/ci.yml'
              - 'scripts/worker-build.sh'
              - 'ripgit/**'
            cli:
              - '.github/workflows/ci.yml'
              - 'cli/**'

  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.version == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify synced versions
        run: npm run version:check

  workspace-check:
    name: Workspace Checks
    runs-on: ubuntu-latest
    needs: [changes]
    if: >-
      needs.changes.outputs.sdk == 'true' ||
      needs.changes.outputs.web == 'true' ||
      needs.changes.outputs.extension == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check GSV package
        if: needs.changes.outputs.sdk == 'true'
        run: npm run gsv:check

      - name: Check web shell
        if: needs.changes.outputs.web == 'true'
        run: npm run check --workspace web

      - name: Build web shell
        if: needs.changes.outputs.web == 'true'
        run: npm run build --workspace web

      - name: Check browser extension
        if: needs.changes.outputs.extension == 'true'
        run: npm run extension:check

      - name: Build browser extension
        if: needs.changes.outputs.extension == 'true'
        run: npm run extension:build

  assembler-build:
    name: Assembler Build
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.assembler == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm ci

      - name: Run Rust unit tests
        working-directory: assembler
        run: cargo test

      - name: Rust check
        working-directory: assembler
        run: cargo check --target wasm32-unknown-unknown

      - name: Bundle worker
        working-directory: assembler
        run: npm exec -- wrangler deploy --minify --dry-run --outdir dist/worker

  gateway-test:
    name: Gateway Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.gateway == 'true'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      GSV_TEST_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
      ALCHEMY_CI_STATE_STORE_CHECK: "false"
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npm exec --workspace gateway -- tsc --noEmit
      
      - name: Run unit tests
        run: npm run test:run --workspace gateway

  ripgit-test:
    name: Ripgit Tests
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.ripgit == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ripgit/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        working-directory: ripgit
        run: npm ci

      - name: Run Rust unit tests
        working-directory: ripgit
        run: cargo test

      - name: Bundle worker
        working-directory: ripgit
        run: npm exec -- wrangler deploy --minify --dry-run --outdir dist/worker

  cli-build:
    name: CLI Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [changes]
    if: needs.changes.outputs.cli == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        working-directory: cli
        run: cargo build --release
      
      - name: Run tests
        working-directory: cli
        run: cargo test
