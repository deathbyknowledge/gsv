name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify synced versions
        run: npm run version:check

  assembler-build:
    name: Assembler Build
    runs-on: ubuntu-latest
    needs: [version-check]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: npm ci

      - name: Rust check
        working-directory: assembler
        run: cargo check --target wasm32-unknown-unknown

      - name: Bundle worker
        working-directory: assembler
        run: npm exec --workspace assembler -- wrangler deploy --dry-run --config wrangler.jsonc --outdir dist/worker

  gateway-test:
    name: Gateway Tests
    runs-on: ubuntu-latest
    needs: [version-check]
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
      GSV_TEST_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
      ALCHEMY_CI_STATE_STORE_CHECK: "false"
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json
      
      - name: Install dependencies
        working-directory: gateway
        run: npm ci
      
      - name: Type check
        working-directory: gateway
        run: npm exec -- tsc --noEmit
      
      - name: Run unit tests
        working-directory: gateway
        run: npm test

  ripgit-test:
    name: Ripgit Tests
    runs-on: ubuntu-latest
    needs: [version-check]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ripgit/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        working-directory: ripgit
        run: npm ci

      - name: Run Rust unit tests
        working-directory: ripgit
        run: cargo test

      - name: Bundle worker
        working-directory: ripgit
        run: npm run deploy -- --dry-run --outdir dist/worker

  cli-build:
    name: CLI Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [version-check]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        working-directory: cli
        run: cargo build --release
      
      - name: Run tests
        working-directory: cli
        run: cargo test
